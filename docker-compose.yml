version: '3.8'

services:
  sfsedgestore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sfsedgestore
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - edgex_data:/app/edgex_data
      - data_sync_queue:/app/data_sync_queue
      - backups:/app/backups
      - ./config.json:/app/config.json:ro
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=info
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sfsedgestore-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sfsedgestore-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - sfsedgestore-network

networks:
  sfsedgestore-network:
    driver: bridge

volumes:
  edgex_data:
  data_sync_queue:
  backups:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true

    - name: Install dependencies
      run: go mod download

    - name: Run go vet
      run: go vet ./...

    - name: Run tests
      run: go test -v $(go list ./... | grep -v database)

    - name: Build
      run: go build -v ./...

  build-artifacts:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME=sfsedgestore-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=${BINARY_NAME}.exe
        fi
        CGO_ENABLED=0 go build -ldflags "-s -w" -o $BINARY_NAME
        mkdir -p artifacts
        mv $BINARY_NAME artifacts/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sfsedgestore-${{ matrix.goos }}-${{ matrix.goarch }}
        path: artifacts/
        retention-days: 30

  release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: List downloaded artifacts
      run: |
        echo "=== Artifacts directory structure ==="
        find ./artifacts -type f
        echo "=== Moving to release directory ==="
        mkdir -p release
        find ./artifacts -type f -exec mv {} release/ \;
        echo "=== Release files ==="
        ls -lh release/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*
        generate_release_notes: true
